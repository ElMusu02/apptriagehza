<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Triage Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
      body { background-color: #f8f9fa; }
      .card { border-radius: 1rem; }
      .form-check-label { user-select: none; }
      .section-title { margin-bottom: 1rem; font-weight: 600; color: #0d6efd; }
      .slider-value { font-weight: 600; margin-left: 0.5rem; }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="text-center mb-4">
        <h1 class="display-5">Planilla de Triage</h1>
        <p class="text-muted">Seleccione los parámetros y signos vitales del paciente</p>
      </div>

      <form method="POST">
        <!-- =========================
             Sección 1: Criterios críticos
        ========================= -->
        <div class="card mb-3 shadow-sm">
          <div class="card-body">
            <h4 class="section-title">Sección 1: Criterios Críticos</h4>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="perdida_estado_alerta" id="perdida_estado_alerta">
              <label class="form-check-label" for="perdida_estado_alerta">Pérdida del estado de alerta</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="apnea" id="apnea">
              <label class="form-check-label" for="apnea">Apnea</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="ausencia_pulso_fc_menor_40" id="ausencia_pulso_fc_menor_40">
              <label class="form-check-label" for="ausencia_pulso_fc_menor_40">Ausencia de pulso / FC < 40</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="angor_dolor_precordial_toracico" id="angor_dolor_precordial_toracico">
              <label class="form-check-label" for="angor_dolor_precordial_toracico">Angor / dolor torácico</label>
            </div>
          </div>
        </div>

        <!-- =========================
             Sección 2: Síntomas con puntaje
        ========================= -->
        <div class="card mb-3 shadow-sm">
          <div class="card-body">
            <h4 class="section-title">Sección 2: Síntomas clínicos</h4>
            {% for p in seccion2 %}
            <div class="mb-2">
              <label for="{{ p }}" class="form-label">{{ p.replace('_',' ').capitalize() }}</label>
              <select class="form-select" name="{{ p }}" id="{{ p }}">
                <option value="0">Ausente (0 pts)</option>
                <option value="5">Leve (5 pts)</option>
                <option value="10">Moderado (10 pts)</option>
                <option value="15">Severo (15 pts)</option>
              </select>
            </div>
            {% endfor %}
          </div>
        </div>

        <!-- =========================
             Sección 3: Signos vitales
        ========================= -->
        <div class="card mb-3 shadow-sm">
          <div class="card-body">
            <h4 class="section-title">Sección 3: Signos vitales</h4>
            <div class="row g-3">
              <div class="col-md-3">
                <label for="frecuencia_cardiaca" class="form-label">Frecuencia cardiaca</label>
                <input type="number" class="form-control" name="frecuencia_cardiaca" id="frecuencia_cardiaca" placeholder="FC" required>
              </div>
              <div class="col-md-3">
                <label for="temperatura" class="form-label">Temperatura (°C)</label>
                <input type="number" step="0.1" class="form-control" name="temperatura" id="temperatura" placeholder="Temp" required>
              </div>
              <div class="col-md-3">
                <label for="frecuencia_respiratoria" class="form-label">Frecuencia respiratoria</label>
                <input type="number" class="form-control" name="frecuencia_respiratoria" id="frecuencia_respiratoria" placeholder="FR" required>
              </div>
              <div class="col-md-3">
                <label for="tension_arterial" class="form-label">Tensión arterial</label>
                <input type="text" class="form-control" name="tension_arterial" id="tension_arterial" placeholder="S/D" required>
              </div>
              <div class="col-md-3">
                <label for="glucemia" class="form-label">Glucemia</label>
                <input type="number" class="form-control" name="glucemia" id="glucemia" placeholder="mg/dL" required>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-center">
          <button type="submit" class="btn btn-primary btn-lg">Evaluar</button>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
